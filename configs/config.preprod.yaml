app:
  env: preprod
  log_level: info

server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

database:
  dsn: "${PREPROD_DB_DSN}"
  max_conns: 20
  min_conns: 5

storage:
  projects_dir: "/data/projects"
  connections_dir: "/data/connections"

etl:
  worker_poll_interval: 5s
  default_channel_buffer: 1000
  max_concurrent_runs: 10

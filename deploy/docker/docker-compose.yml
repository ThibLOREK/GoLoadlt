version: "3.9"

services:
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      - ACTIVE_ENV=dev
      - PROJECTS_DIR=/data/projects
      - CONNECTIONS_DIR=/data/connections
      - SERVER_ADDR=:8080
    volumes:
      - goloadit_data:/data
    depends_on:
      - postgres
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    environment:
      - ACTIVE_ENV=dev
      - PROJECTS_DIR=/data/projects
      - CONNECTIONS_DIR=/data/connections
    volumes:
      - goloadit_data:/data
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: goloadit
      POSTGRES_PASSWORD: goloadit
      POSTGRES_DB: goloadit
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  goloadit_data:
  pg_data:

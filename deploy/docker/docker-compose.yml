version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: goloadit-postgres
    environment:
      POSTGRES_DB: goloadit
      POSTGRES_USER: goloadit
      POSTGRES_PASSWORD: goloadit_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goloadit"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.server
    container_name: goloadit-server
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=dev
      - DB_DSN=postgres://goloadit:goloadit_dev@postgres:5432/goloadit?sslmode=disable
      - PROJECTS_DIR=/data/projects
      - CONNECTIONS_DIR=/data/connections
      - LOG_LEVEL=debug
    volumes:
      - goloadit_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    container_name: goloadit-worker
    environment:
      - APP_ENV=dev
      - DB_DSN=postgres://goloadit:goloadit_dev@postgres:5432/goloadit?sslmode=disable
      - PROJECTS_DIR=/data/projects
      - CONNECTIONS_DIR=/data/connections
      - LOG_LEVEL=debug
    volumes:
      - goloadit_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  goloadit_data:
